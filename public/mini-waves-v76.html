<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Waves · V76</title>
<!--
╔══════════════════════════════════════════════════════════════════════════════╗
║  MINI WAVES  ·  V76  ·  04/09/26  CLEAN REBUILD                            ║
║  One Ocean at a time · Personal default · Full 10-level hierarchy          ║
╚══════════════════════════════════════════════════════════════════════════════╝
-->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   ROOT & TOKENS
═══════════════════════════════════════ */
:root {
  /* Backgrounds */
  --void:    #030508;
  --deep:    #06080F;
  --panel:   #0C1018;
  --card:    #111827;
  --line:    #1E2A3A;
  --hover:   rgba(255,255,255,.04);

  /* Text */
  --white:   #F4F8FF;
  --pale:    #C8D8EE;
  --steel:   #7A8FAA;
  --muted:   #3A4D6A;

  /* Motion — burned orange spectrum */
  --motion:       #D4780A;
  --motion-glow:  rgba(212,120,10,.25);

  /* Hierarchy — water/flow spectrum */
  --ocean:    #0EA5E9;   /* sky blue — now top level */
  --wave:     #3B82F6;   /* blue */
  --tide:     #06B6D4;   /* cyan */
  --flow:     #10B981;   /* emerald */
  --ripple:   #34D399;   /* green */
  --drip:     #6EE7B7;   /* mint */
  --drop:     #A7F3D0;   /* pale mint */
  --trickle:  #38BDF8;   /* light blue */
  --dribble:  #7DD3FC;   /* pale blue */
  --h2o:      #BAE6FD;   /* lightest blue — leaf */

  /* Urgency */
  --urg-high:   #EF4444;
  --urg-mid:    #F59E0B;
  --urg-low:    #10B981;

  /* Fonts */
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body:    'Barlow', sans-serif;
  --font-serif:   'Cinzel', serif;
  --font-mono:    'Space Mono', monospace;

  /* Sidebar */
  --sb-width: 390px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--void);
  color: var(--white);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  font-size: 15px;
}

/* ═══════════════════════════════════════
   STARFIELD
═══════════════════════════════════════ */
#starfield { position:fixed; inset:0; z-index:0; pointer-events:none; }
.star { position:absolute; border-radius:50%; background:#fff;
  animation:twinkle var(--td,3s) ease-in-out infinite var(--dl,0s); }
@keyframes twinkle { 0%,100%{opacity:var(--lo,.03)} 50%{opacity:var(--hi,.25)} }

/* ═══════════════════════════════════════
   APP HEADER
═══════════════════════════════════════ */
.app-hdr {
  height:60px; flex-shrink:0;
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
  background:rgba(6,8,15,.97);
  border-bottom:1px solid rgba(14,165,233,.2);
  position:relative; z-index:20;
  box-shadow:0 2px 30px rgba(14,165,233,.06);
}
.hdr-logo {
  display:flex; align-items:center; gap:12px;
}
.hdr-logo-icon {
  display:flex; flex-direction:column; gap:3px;
}
.hdr-logo-icon span {
  display:block; height:4px; border-radius:2px;
}
.hdr-title {
  font-family:var(--font-serif);
  font-size:20px; font-weight:900; letter-spacing:.16em;
  color:var(--white);
}
.hdr-title em { color:#0EA5E9; font-style:normal; }
.hdr-sub {
  font-family:var(--font-mono);
  font-size:8px; letter-spacing:.18em; color:var(--muted);
  margin-top:1px;
}
.hdr-center {
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
}
.view-pill {
  display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;
}
.view-pill-btn {
  font-family:var(--font-display); font-size:14px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:7px 20px; cursor:pointer;
  color:var(--steel); background:transparent;
  transition:all .15s; border:none; outline:none;
}
.view-pill-btn:first-child { border-right:1px solid var(--line); }
.view-pill-btn:not(:first-child):not(:last-child) { border-right:1px solid var(--line); }

/* ═══════════════════════════════════════
   OVERVIEW VIEW
═══════════════════════════════════════ */
.overview-wrap {
  flex:1; position:relative; overflow:hidden;
  display:flex; flex-direction:column;
}
.overview-scroll {
  flex:1; overflow-y:auto; overflow-x:hidden;
  padding:24px 32px 40px;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
  position:relative; z-index:1;
}
.overview-svg {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; overflow:visible;
  z-index:2;
}

/* Row */
.ov-row {
  margin-bottom:6px;
  animation:rowDrop .2s ease;
}
@keyframes rowDrop {
  from { opacity:0; transform:translateY(-10px); }
  to   { opacity:1; transform:translateY(0); }
}
.ov-row-inner {
  display:flex; align-items:flex-start; gap:0;
}
.ov-row-label {
  font-family:var(--font-display); font-size:11px; font-weight:900;
  letter-spacing:.18em; text-transform:uppercase;
  margin-bottom:6px; padding-left:2px;
  opacity:.7;
}
.ov-row-nodes {
  display:flex; flex-wrap:wrap; gap:6px;
  flex:1; padding:4px 0;
}

/* Node */
.ov-node {
  display:flex; align-items:center; gap:8px;
  padding:9px 16px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.025);
  cursor:pointer;
  transition:background .13s, border-color .13s, transform .1s, box-shadow .13s;
  position:relative;
  white-space:nowrap;
}
.ov-node:hover {
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.16);
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.ov-node.selected {
  background:rgba(255,255,255,.09);
  transform:translateY(-2px);
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.ov-node.selected::after {
  content:'';
  position:absolute; bottom:-7px; left:50%; transform:translateX(-50%);
  width:2px; height:7px;
  background:currentColor; opacity:.6;
}
.ov-node-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:transparent;
  border:2px solid currentColor;
  transition:all .15s;
}
.ov-node.selected .ov-node-dot {
  background:currentColor;
  box-shadow:0 0 8px currentColor;
}
.ov-node-label {
  font-family:var(--font-display); font-size:15px; font-weight:500;
  color:var(--pale);
  transition:color .12s;
}
.ov-node.selected .ov-node-label { color:var(--white); font-weight:700; }
.ov-node-badge {
  font-family:var(--font-mono); font-size:10px;
  padding:2px 7px; border-radius:4px;
  background:rgba(255,255,255,.07); color:var(--muted);
  flex-shrink:0;
}
.ov-node.selected .ov-node-badge {
  background:rgba(255,255,255,.14); color:var(--pale);
}
.ov-node-star {
  font-family:var(--font-mono); font-size:10px;
  padding:2px 7px; border-radius:4px;
  background:rgba(212,120,10,.15); color:var(--motion);
  flex-shrink:0;
}

/* Connector strip between rows */
.ov-connector-strip {
  height:32px; position:relative;
  margin:0 0 0 100px;
}

/* Unassigned tasks row */
.ov-unassigned {
  display:flex; flex-wrap:wrap; gap:5px;
  margin-bottom:8px; margin-top:2px;
}
.ov-unassigned-lbl {
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--muted); width:100%; margin-bottom:4px;
}
.ov-task-chip {
  display:flex; align-items:center; gap:6px;
  padding:6px 12px; border-radius:8px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  cursor:pointer; transition:all .12s;
  font-family:var(--font-display); font-size:13px; font-weight:400;
  color:var(--pale);
}
.ov-task-chip:hover { background:rgba(255,255,255,.06); color:var(--white); }
.view-pill-btn:hover { color:var(--white); background:var(--hover); }
.view-pill-btn.active {
  color:var(--motion); background:rgba(212,120,10,.1);
  border-color:rgba(212,120,10,.4);
}
.hdr-actions { display:flex; align-items:center; gap:8px; }
.txt-size-ctrl {
  display:flex; align-items:center; gap:2px;
  border:1px solid var(--line); border-radius:7px; overflow:hidden;
}
.txt-size-btn {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  padding:6px 10px; background:none; border:none; cursor:pointer;
  color:var(--steel); transition:all .13s;
}
.txt-size-btn:hover { color:var(--white); background:rgba(255,255,255,.06); }
.txt-size-val {
  font-family:var(--font-mono); font-size:10px; color:var(--muted);
  padding:0 6px; border-left:1px solid var(--line); border-right:1px solid var(--line);
  white-space:nowrap;
}
.btn-new {
  display:flex; align-items:center; gap:7px;
  font-family:var(--font-display); font-size:14px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:8px 18px; border-radius:7px;
  border:1px solid rgba(212,120,10,.5);
  color:var(--motion); background:rgba(212,120,10,.08);
  cursor:pointer; transition:all .15s;
}
.btn-new:hover { background:rgba(212,120,10,.18); border-color:rgba(212,120,10,.8); }
.btn-new svg { flex-shrink:0; }

/* ═══════════════════════════════════════
   TIME FILTER BAR
═══════════════════════════════════════ */
.time-bar {
  flex-shrink:0; height:54px;
  display:flex; align-items:center; gap:6px;
  padding:0 20px 0 20px;
  background:rgba(6,8,15,.9);
  border-bottom:1px solid var(--line);
  position:relative; z-index:30;
}
.time-chip {
  font-family:var(--font-display); font-size:14px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
  padding:5px 16px; border-radius:6px;
  border:1px solid var(--line); cursor:pointer;
  color:var(--steel); background:transparent;
  transition:all .14s;
}
.time-chip:hover { color:var(--white); border-color:rgba(255,255,255,.2); }
/* Motion chip — inherits motion color when active */
.time-chip-motion { display:flex; align-items:center; gap:7px; color:#EF4444; border-color:rgba(239,68,68,.45); background:rgba(239,68,68,.07); font-weight:800; }
.time-chip-motion:hover { border-color:rgba(239,68,68,.7); background:rgba(239,68,68,.14); }
/* All chip — always bright white */
.time-chip-all {
  display:flex; align-items:center; gap:7px;
  color:var(--white) !important;
  border-color:rgba(255,255,255,.35) !important;
  font-weight:800;
}
.time-chip-all:hover { border-color:rgba(255,255,255,.6) !important; background:rgba(255,255,255,.06) !important; }
/* Ocean chip — sky blue */
.time-chip-ocean {
  display:flex; align-items:center; gap:7px;
  color:#0EA5E9; border-color:rgba(14,165,233,.4);
  background:rgba(14,165,233,.07);
}
.time-chip-ocean:hover { border-color:rgba(14,165,233,.7) !important; background:rgba(14,165,233,.14) !important; }
.time-chip-view {
  color:#60A5FA;
  border-color:rgba(96,165,250,.4);
  background:rgba(96,165,250,.07);
}
.time-chip-view:hover { color:#93C5FD; border-color:rgba(96,165,250,.7); background:rgba(96,165,250,.13); }
.time-chip.active {
  color:var(--urg-high); border-color:rgba(239,68,68,.5);
  background:rgba(239,68,68,.08);
}
.time-chip.active[data-t="today"] { color:#F59E0B; border-color:rgba(245,158,11,.5); background:rgba(245,158,11,.08); }
.time-chip.active[data-t="week"]  { color:var(--tide); border-color:rgba(16,185,129,.5); background:rgba(16,185,129,.08); }
.time-sep { width:1px; height:16px; background:var(--line); margin:0 4px; }

/* ═══════════════════════════════════════
   APP BODY
═══════════════════════════════════════ */
.app-body {
  flex:1; min-height:0; display:flex; overflow:hidden; position:relative; z-index:1;
}

/* ═══════════════════════════════════════
   MOTIONS DROPDOWN (time bar)
═══════════════════════════════════════ */
.motion-drop-wrap { position:relative; }
.motion-drop-btn {
  display:flex; align-items:center; gap:5px;
  white-space:nowrap;
}
.motion-drop-btn.has-filter {
  color:var(--motion); border-color:rgba(212,120,10,.5);
  background:rgba(212,120,10,.1);
}
#motionDropCount {
  font-family:var(--font-mono); font-size:10px;
  background:rgba(212,120,10,.2); color:var(--motion);
  padding:1px 6px; border-radius:4px;
  display:none;
}
#motionDropCount.visible { display:inline; }
.motion-drop-panel {
  display:none; position:absolute; top:calc(100% + 4px); left:0;
  min-width:220px; background:var(--panel);
  border:1px solid rgba(255,255,255,.1); border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.8); z-index:600;
  overflow:hidden;
}
.motion-drop-panel.open { display:block; }
.motion-drop-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; cursor:pointer;
  transition:background .1s;
  border-top:1px solid rgba(255,255,255,.03);
  font-family:var(--font-display); font-size:15px; font-weight:400;
  color:var(--pale);
}
.motion-drop-item:hover { background:rgba(255,255,255,.05); color:var(--white); }
.motion-drop-item.active { background:rgba(255,255,255,.06); font-weight:600; }
.mdrop-all-row {
  display:flex; align-items:center; gap:6px;
  padding:8px 14px; border-bottom:1px solid var(--line);
}
.mdrop-all-btn {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:3px 8px; border-radius:4px; cursor:pointer;
  border:1px solid var(--line); color:var(--steel); background:none;
  transition:all .12s;
}
.mdrop-all-btn:hover { color:var(--white); }
.mdrop-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 14px; cursor:pointer;
  transition:background .1s;
  border-top:1px solid rgba(255,255,255,.03);
  font-family:var(--font-display); font-size:15px; font-weight:400;
  color:var(--pale); position:relative;
}
.mdrop-item:hover { background:rgba(255,255,255,.05); color:var(--white); }
.mdrop-item.active { background:rgba(255,255,255,.06); color:var(--white); font-weight:600; }
.mdrop-item.active::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:0 2px 2px 0; background:var(--motion);
}
.mdrop-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.mdrop-count { font-family:var(--font-mono); font-size:10px; color:var(--muted); margin-left:auto; }

/* ═══════════════════════════════════════
   LEFT SIDEBAR — ICON RAIL + FULL PANEL
═══════════════════════════════════════ */
:root { --rail-w: 64px; --panel-w: 260px; }

.sidebar {
  width:var(--rail-w); flex-shrink:0;
  background:rgba(6,8,15,.97);
  border-right:1px solid var(--line);
  display:flex; flex-direction:row; align-self:stretch;
  overflow:visible;
  position:relative; z-index:50;
  transition:width .22s ease;
}
.sidebar.expanded { width:calc(var(--rail-w) + var(--panel-w)); }

/* Icon rail */
.sb-rail {
  width:var(--rail-w); flex-shrink:0;
  background:rgba(6,8,15,.98);
  border-right:1px solid var(--line);
  z-index:2;
  display:flex;
  flex-direction:column;
  overflow-y:scroll;
  scrollbar-width:none;
}
.sb-rail::-webkit-scrollbar { display:none; }
.sb-rail-icon {
  width:64px; height:44px; flex-shrink:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; cursor:pointer;
  transition:background .12s;
}
.sb-rail-icon:hover { background:rgba(255,255,255,.07); }
.sb-rail-icon.active { background:rgba(255,255,255,.08); }
/* Icon line shapes */
.rl { display:block; border-radius:2px; background:currentColor; }

/* Full panel (slides in) */
.sb-panel {
  width:var(--panel-w); flex-shrink:0;
  display:flex; flex-direction:column; min-height:0;
  overflow:clip;
  opacity:0; pointer-events:none;
  transition:opacity .18s ease;
}
.sidebar.expanded .sb-panel { opacity:1; pointer-events:all; }

/* Motions fixed header inside panel */
.sb-motions-hdr {
  display:flex; align-items:center; gap:8px;
  padding:14px 16px 10px;
  border-bottom:1px solid rgba(212,120,10,.25);
  background:rgba(212,120,10,.04);
  flex-shrink:0;
}
.sb-motions-title {
  font-family:var(--font-display); font-size:18px; font-weight:900;
  letter-spacing:.08em; text-transform:uppercase;
  color:var(--motion); flex:1;
  text-shadow:0 0 18px rgba(212,120,10,.3);
}
.sb-motions-list {
  flex-shrink:0;
  border-bottom:2px solid rgba(212,120,10,.2);
  background:rgba(6,8,15,.98);
  max-height:280px; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}
.sb-scroll {
  flex:1; min-height:0; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}

/* Sidebar section header */
.sb-section {
  border-bottom:none;
  margin-bottom:-1px;
}
.sb-section-hdr {
  display:flex; align-items:center; gap:8px;
  padding:0 12px;
  height:44px; box-sizing:border-box;
  cursor:pointer; position:relative; z-index:5;
  background:rgba(6,8,15,1);
  border-bottom:1px solid var(--line);
  transition:background .12s;
  user-select:none;
}
.sb-section-hdr:hover { background:rgba(14,16,24,1); }
.sb-section-hdr.has-filter::after {
  content:''; width:6px; height:6px; border-radius:50%;
  background:currentColor; flex-shrink:0;
  box-shadow:0 0 6px currentColor;
}
.sb-section:not(.open) .sb-items { display:none; }
.sb-section-title {
  font-family:var(--font-display); font-size:16px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase; flex:1;
}
.sb-section-actions {
  display:flex; align-items:center; gap:4px;
}
.sb-action-btn {
  font-family:var(--font-mono); font-size:11px;
  color:var(--muted); cursor:pointer; padding:2px 4px;
  border-radius:3px; transition:color .12s;
  border:none; background:none;
}
.sb-action-btn:hover { color:var(--pale); }


/* Sidebar items */
.sb-items { overflow:hidden; max-height:0; }
.sb-section.open .sb-items {
  overflow-y:auto; max-height:240px;
  padding-top:6px; padding-bottom:8px;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}
.sb-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 16px 9px 24px;
  cursor:pointer; transition:background .1s;
  border-top:1px solid rgba(255,255,255,.025);
  position:relative;
}
.sb-item:hover { background:rgba(255,255,255,.04); }
.sb-item.active { background:rgba(255,255,255,.06); }
.sb-item.active::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:0 2px 2px 0;
  background:currentColor;
}
.sb-item-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
  background:transparent;
  border:2px solid currentColor;
  opacity:.55;
  transition:all .15s;
}

/* FILTER MODE — selected dot solid, others stay hollow */
.sb-item.active .sb-item-dot {
  background:currentColor;
  opacity:1;
  box-shadow:0 0 8px currentColor;
}
.sb-item-label {
  font-family:var(--font-display); font-size:16px; font-weight:400;
  flex:1; color:inherit; opacity:.75; transition:color .1s, opacity .1s;
}
.sb-item:hover .sb-item-label { opacity:.95; }
.sb-item.active .sb-item-label { color:inherit; font-weight:700; opacity:1; }
.sb-item-count {
  font-family:var(--font-mono); font-size:11px; color:inherit; opacity:.5;
}
.sb-item-actions {
  display:flex; gap:2px; opacity:0; transition:opacity .1s;
}
.sb-item:hover .sb-item-actions { opacity:1; }
.sb-item-act {
  font-family:var(--font-mono); font-size:10px; color:var(--muted);
  cursor:pointer; padding:1px 3px; border-radius:2px;
  border:none; background:none; transition:color .1s;
}
.sb-item-act:hover { color:var(--pale); }

/* All/Reset row */


/* Filter sections (Location, Resources, etc.) */
.sb-filter-item {
  display:flex; align-items:center; gap:10px;
  padding:8px 16px 8px 24px;
  cursor:pointer; transition:background .1s;
  border-top:1px solid rgba(255,255,255,.02);
  position:relative;
}
.sb-filter-item:hover { background:rgba(255,255,255,.04); }
.sb-filter-item.active { background:rgba(255,255,255,.05); }
.sb-filter-item.active::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:0 2px 2px 0; background:var(--pale);
}
.sb-filter-label {
  font-family:var(--font-display); font-size:15px; font-weight:400;
  color:#C8D8EE; flex:1;
}
.sb-filter-item.active .sb-filter-label { color:var(--white); font-weight:600; }

/* Urgency numbers */
.sb-urg-item {
  display:flex; align-items:center; gap:12px;
  padding:7px 16px 7px 24px;
  cursor:pointer; transition:background .1s;
  border-top:1px solid rgba(255,255,255,.02);
}
.sb-urg-item:hover { background:rgba(255,255,255,.04); }
.sb-urg-num {
  font-family:var(--font-mono); font-size:15px; font-weight:700;
  width:20px; text-align:center;
}
.sb-urg-bar {
  flex:1; height:4px; border-radius:2px; background:var(--line);
  position:relative; overflow:hidden;
}
.sb-urg-bar-fill { height:100%; border-radius:2px; }

/* ═══════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════ */
.content {
  flex:1; display:flex; flex-direction:column; overflow:hidden;
}
.block-scroll {
  flex:1; overflow-y:auto; padding:16px 20px;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}

/* ═══════════════════════════════════════
   MOTION GROUP (Block View)
═══════════════════════════════════════ */
.motion-group {
  margin-bottom:24px;
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px; overflow:hidden;
  background:rgba(255,255,255,.015);
}
.motion-group-hdr {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px;
  background:color-mix(in srgb, currentColor 6%, transparent);
  border-bottom:1px solid color-mix(in srgb, currentColor 20%, transparent);
  cursor:pointer; user-select:none;
  transition:background .12s;
}
.motion-group-hdr:hover { background:color-mix(in srgb, currentColor 12%, transparent); }
.motion-group-icon {
  width:36px; height:36px; border-radius:8px;
  background:color-mix(in srgb, currentColor 18%, transparent);
  border:1px solid color-mix(in srgb, currentColor 35%, transparent);
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
}
.motion-group-name {
  font-family:var(--font-display); font-size:20px; font-weight:900;
  letter-spacing:.06em; text-transform:uppercase;
  color:currentColor; flex:1;
}
.motion-group-count {
  font-family:var(--font-mono); font-size:12px; color:var(--muted);
  padding:3px 10px; border-radius:10px;
  background:rgba(255,255,255,.04); border:1px solid var(--line);
}
.motion-group-caret {
  font-size:12px; color:var(--muted); transition:transform .18s;
}
.motion-group.collapsed .motion-group-caret { transform:rotate(-90deg); }
.motion-tasks { overflow:hidden; }

/* ═══════════════════════════════════════
   TASK ROW
═══════════════════════════════════════ */
.task-row {
  border-top:1px solid rgba(255,255,255,.04);
  transition:background .1s;
  position:relative;
}
.task-row:hover { background:rgba(255,255,255,.03); }
.task-row.expanded { background:rgba(255,255,255,.04); }

.task-collapsed {
  display:flex; align-items:center; gap:12px;
  padding:12px 20px;
  cursor:pointer;
}
.task-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  box-shadow:0 0 6px currentColor;
}
.task-label {
  font-family:var(--font-display); font-size:17px; font-weight:600;
  color:var(--white); flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.task-breadcrumb {
  font-family:var(--font-mono); font-size:10px; color:var(--white);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:260px; opacity:.75;
}
.task-badges {
  display:flex; align-items:center; gap:5px; flex-shrink:0;
}
.task-badge {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  padding:2px 8px; border-radius:4px;
  border:1px solid currentColor;
}
.task-expand-btn {
  width:28px; height:28px; border-radius:6px;
  border:1px solid var(--line); background:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--muted); font-size:13px;
  transition:all .12s; flex-shrink:0;
}
.task-expand-btn:hover { color:var(--white); border-color:rgba(255,255,255,.2); }
.task-row.expanded .task-expand-btn { transform:rotate(180deg); }

/* ═══════════════════════════════════════
   TASK EXPANDED CARD
═══════════════════════════════════════ */
.task-card {
  display:none;
  padding:16px 20px 20px 40px;
  border-top:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.045);
  animation:cardOpen .18s ease;
}
.task-row.expanded .task-card { display:block; }
@keyframes cardOpen { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

.task-card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
  gap:12px;
  margin-bottom:16px;
}
.task-field {
  display:flex; flex-direction:column; gap:4px;
}
.task-field-label {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:#8BAABF;
}
.task-field-val {
  font-family:var(--font-display); font-size:15px; font-weight:600;
  color:var(--white); background:rgba(255,255,255,.05);
  border:1px solid var(--line); border-radius:6px;
  padding:7px 12px; cursor:pointer;
  transition:all .12s; min-height:36px;
  display:flex; align-items:center;
}
.task-field-val:hover { border-color:rgba(255,255,255,.18); color:var(--white); }
.task-field-val.placeholder { color:var(--steel); font-style:italic; font-weight:400; font-size:14px; }
/* Inline edit inputs — match task-field-val visually */
.task-field-input {
  font-family:var(--font-display); font-size:15px; font-weight:500;
  color:var(--white); background:rgba(255,255,255,.05);
  border:1px solid var(--line); border-radius:6px;
  padding:7px 10px; width:100%; min-height:36px;
  transition:border-color .12s; outline:none;
  appearance:none; -webkit-appearance:none;
}
.task-field-input:focus { border-color:rgba(96,165,250,.5); background:rgba(255,255,255,.08); }
.task-field-input option { background:var(--panel); color:var(--white); }
textarea.task-field-input { min-height:60px; resize:vertical; line-height:1.5; }

/* Hierarchy breadcrumb in card */
.task-hier {
  display:flex; align-items:center; gap:6px; flex-wrap:wrap;
  margin-bottom:14px;
}
.task-hier-chip {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  padding:3px 10px; border-radius:5px;
  border:1px solid currentColor;
  opacity:.8;
}
.task-hier-sep { color:var(--muted); font-size:10px; }

/* Updates log */
.task-updates {
  margin-top:14px; border-top:1px solid rgba(255,255,255,.12); padding-top:12px;
}
.task-updates-hdr {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.18em; text-transform:uppercase; color:#8BAABF;
  margin-bottom:8px;
}
.task-update-row {
  font-size:13px; color:var(--pale); padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.03);
  display:flex; gap:10px;
}
.task-update-time { font-family:var(--font-mono); font-size:10px; color:var(--steel); flex-shrink:0; }
.task-update-add {
  display:flex; align-items:center; gap:8px; margin-top:8px;
}
.task-update-input {
  flex:1; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18);
  border-radius:6px; padding:7px 12px; color:var(--white);
  font-family:var(--font-body); font-size:13px; outline:none;
}
.task-update-input:focus { border-color:rgba(14,165,233,.4); }
.task-update-submit {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  padding:7px 14px; border-radius:6px;
  border:1px solid rgba(14,165,233,.4); color:var(--wave);
  background:rgba(14,165,233,.07); cursor:pointer; transition:all .13s;
}
.task-update-submit:hover { background:rgba(14,165,233,.15); }

/* Task card footer actions */
.task-card-foot {
  display:flex; align-items:center; gap:8px; margin-top:16px;
  padding-top:14px; border-top:1px solid rgba(255,255,255,.05);
}
.task-card-btn {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.08em; text-transform:uppercase;
  padding:7px 16px; border-radius:6px; cursor:pointer;
  border:1px solid var(--line); color:var(--steel); background:none;
  transition:all .13s;
}
.task-card-btn:hover { color:var(--white); border-color:rgba(255,255,255,.2); }
.task-card-btn.danger { border-color:rgba(239,68,68,.3); color:var(--urg-high); }
.task-card-btn.danger:hover { background:rgba(239,68,68,.1); }
.task-card-btn.primary { border-color:rgba(212,120,10,.5); color:var(--motion); background:rgba(212,120,10,.08); }
.task-card-btn.primary:hover { background:rgba(212,120,10,.18); }

/* Empty state */
.empty-group {
  padding:24px 20px; text-align:center;
  font-family:var(--font-display); font-size:15px; color:var(--muted);
  font-style:italic;
}

/* ═══════════════════════════════════════
   NEW TASK MODAL
═══════════════════════════════════════ */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(3,5,8,.88);
  align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:var(--panel); border:1px solid rgba(14,165,233,.2);
  border-radius:14px; width:580px; max-width:94vw;
  max-height:88vh; overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.8);
}
.modal-hdr {
  display:flex; align-items:center; gap:12px;
  padding:18px 22px; border-bottom:1px solid var(--line);
  position:sticky; top:0; background:var(--panel); z-index:2;
}
.modal-title {
  font-family:var(--font-serif); font-size:15px; font-weight:700;
  letter-spacing:.12em; text-transform:uppercase; color:var(--motion);
  flex:1;
}
.modal-close {
  width:28px; height:28px; border-radius:6px;
  border:1px solid var(--line); background:none; cursor:pointer;
  color:var(--muted); font-size:16px; transition:all .13s;
  display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { color:var(--white); border-color:rgba(255,255,255,.25); }
.modal-body { padding:22px; }
.modal-section { margin-bottom:20px; }
.modal-section-label {
  font-family:var(--font-mono); font-size:10px; font-weight:700;
  letter-spacing:.2em; text-transform:uppercase; color:var(--muted);
  margin-bottom:10px; display:block;
}
.modal-input, .modal-select, .modal-textarea {
  width:100%; background:rgba(255,255,255,.04);
  border:1px solid var(--line); border-radius:8px;
  padding:10px 14px; color:var(--white);
  font-family:var(--font-display); font-size:16px;
  outline:none; transition:border-color .15s;
}
.modal-input:focus, .modal-select:focus, .modal-textarea:focus {
  border-color:rgba(212,120,10,.5);
}
.modal-select { background:#0C1018; cursor:pointer; }
.modal-textarea { resize:vertical; min-height:80px; font-size:15px; }
.modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* Motion picker grid */
.motion-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
}
.motion-opt {
  padding:10px 12px; border-radius:8px;
  border:1px solid var(--line); cursor:pointer;
  transition:all .13s; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:5px;
}
.motion-opt:hover { background:rgba(255,255,255,.04); border-color:rgba(255,255,255,.15); }
.motion-opt.sel { border-color:var(--motion); background:rgba(212,120,10,.1); }
.motion-opt-icon { font-size:18px; }
.motion-opt-label {
  font-family:var(--font-display); font-size:13px; font-weight:700;
  color:var(--pale); letter-spacing:.03em;
}
.motion-opt.sel .motion-opt-label { color:var(--motion); }

.modal-foot {
  display:flex; align-items:center; gap:8px; justify-content:flex-end;
  padding:16px 22px; border-top:1px solid var(--line);
  position:sticky; bottom:0; background:var(--panel);
}
.modal-btn {
  font-family:var(--font-mono); font-size:12px; font-weight:700;
  letter-spacing:.08em; padding:9px 20px; border-radius:7px;
  cursor:pointer; transition:all .13s;
  border:1px solid var(--line); color:var(--muted); background:none;
}
.modal-btn:hover { color:var(--white); border-color:rgba(255,255,255,.2); }
.modal-btn.primary {
  background:var(--motion); border-color:var(--motion); color:#000; font-weight:800;
}
.modal-btn.primary:hover { filter:brightness(1.15); }
/* ═══════════════════════════════════════
   OUTLOOK VIEW
═══════════════════════════════════════ */
.outlook-wrap {
  flex:1; position:relative; overflow:hidden;
  cursor:grab; user-select:none;
}
.outlook-wrap.dragging { cursor:grabbing; }
.outlook-canvas {
  position:absolute; top:0; left:0;
  display:flex; align-items:flex-start; gap:0;
  padding:24px 40px;
  min-height:100%;
  transition:transform .05s linear;
}
.outlook-svg {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none; overflow:visible;
  z-index:2;
}

/* Column */
.ol-col {
  width:220px; flex-shrink:0;
  display:flex; flex-direction:column;
  margin-right:12px;
}
.ol-col-hdr {
  font-family:var(--font-display); font-size:14px; font-weight:900;
  letter-spacing:.14em; text-transform:uppercase;
  padding:8px 14px 10px;
  border-bottom:2px solid currentColor;
  margin-bottom:8px; flex-shrink:0;
  opacity:.9;
}
.ol-col-items {
  display:flex; flex-direction:column; gap:4px;
  max-height:calc(100vh - 200px); overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
  padding-bottom:16px;
}

/* Node */
.ol-node {
  display:flex; align-items:center; gap:8px;
  padding:9px 14px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.02);
  cursor:pointer;
  transition:background .12s, border-color .12s, transform .1s;
  position:relative;
}
.ol-node:hover {
  background:rgba(255,255,255,.06);
  border-color:rgba(255,255,255,.14);
  transform:translateX(2px);
}
.ol-node.selected {
  background:rgba(255,255,255,.08);
  border-color:currentColor;
  transform:translateX(3px);
}
.ol-node.selected::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:0 2px 2px 0;
  background:currentColor;
}
.ol-node-dot {
  width:9px; height:9px; border-radius:50%; flex-shrink:0;
  background:transparent;
  border:2px solid currentColor;
  transition:all .15s;
}
.ol-node.selected .ol-node-dot {
  background:currentColor;
  box-shadow:0 0 8px currentColor;
}
.ol-node-label {
  font-family:var(--font-display); font-size:15px; font-weight:500;
  color:var(--pale); flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ol-node.selected .ol-node-label { color:var(--white); font-weight:700; }
.ol-node-badge {
  font-family:var(--font-mono); font-size:10px;
  padding:2px 6px; border-radius:4px;
  background:rgba(255,255,255,.06);
  color:var(--muted); flex-shrink:0;
}
.ol-node.selected .ol-node-badge {
  background:rgba(255,255,255,.12); color:var(--pale);
}
.ol-node-actions {
  display:flex; gap:3px; opacity:0; transition:opacity .12s; flex-shrink:0;
}
.ol-node:hover .ol-node-actions { opacity:1; }
.ol-edit-btn {
  font-size:11px; color:var(--muted); cursor:pointer;
  padding:2px 5px; border-radius:3px;
  border:1px solid var(--line); background:none;
  transition:all .1s; line-height:1;
}
.ol-edit-btn:hover { color:var(--white); border-color:rgba(255,255,255,.25); }
.ol-add-btn {
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  color:var(--muted); cursor:pointer; padding:1px 6px;
  border:1px solid var(--line); border-radius:4px; background:none;
  margin-left:auto; transition:all .1s;
}
.ol-add-btn:hover { color:var(--white); border-color:rgba(255,255,255,.25); }
/* Inline edit input inside ol-node */
.ol-inline-input {
  font-family:var(--font-display); font-size:14px; font-weight:500;
  color:var(--white); background:rgba(255,255,255,.1);
  border:1px solid rgba(96,165,250,.5); border-radius:5px;
  padding:3px 8px; outline:none; flex:1; min-width:0;
}
.ol-inline-input:focus { border-color:rgba(96,165,250,.8); }

/* Unassigned section */
.ol-unassigned-hdr {
  font-family:var(--font-mono); font-size:9px; font-weight:700;
  letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted); padding:8px 14px 4px;
  margin-top:8px; border-top:1px solid var(--line);
}

/* ─── TASK DRAWER (Outlook / Overview) ─── */
.task-drawer {
  position:fixed; right:0; top:0; bottom:0; z-index:400;
  width:420px; max-width:90vw;
  background:var(--panel);
  border-left:1px solid rgba(255,255,255,.1);
  box-shadow:-16px 0 48px rgba(0,0,0,.7);
  display:flex; flex-direction:column;
  overflow:hidden;
  animation:drawerIn .2s ease;
}
@keyframes drawerIn { from{transform:translateX(100%)} to{transform:translateX(0)} }
.task-drawer-hdr {
  display:flex; align-items:center; gap:10px;
  padding:14px 18px; border-bottom:1px solid var(--line);
  flex-shrink:0; background:rgba(255,255,255,.03);
}
.task-drawer-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.task-drawer-title {
  font-family:var(--font-display); font-size:16px; font-weight:700;
  color:var(--white); flex:1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.task-drawer-close {
  width:28px; height:28px; border-radius:6px;
  border:1px solid var(--line); background:none; cursor:pointer;
  color:var(--muted); font-size:16px; transition:all .12s;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.task-drawer-close:hover { color:var(--white); border-color:rgba(255,255,255,.3); }
.task-drawer-body {
  flex:1; overflow-y:auto;
  scrollbar-width:thin; scrollbar-color:var(--line) transparent;
}
/* Drawer uses same .task-card styles but visible by default */
.task-drawer-body .task-card {
  display:block !important;
  background:transparent;
  border-top:none;
  animation:none;
}

/* ─── AUTO-SAVE TOAST ─── */
.save-toast {
  position:fixed; bottom:24px; right:24px; z-index:900;
  background:rgba(16,185,129,.15);
  border:1px solid rgba(16,185,129,.35);
  border-radius:8px; padding:8px 16px;
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  color:#10B981;
  pointer-events:none;
  opacity:0; transform:translateY(8px);
  transition:opacity .2s ease, transform .2s ease;
}
.save-toast.show { opacity:1; transform:translateY(0); }

/* ── OCEAN PULSE ── */
@keyframes oceanPulse {
  0%   { box-shadow: 0 0 0 0 currentColor; opacity:.85; transform:scale(1); }
  50%  { box-shadow: 0 0 0 4px transparent; opacity:1; transform:scale(1.15); }
  100% { box-shadow: 0 0 0 0 transparent; opacity:.85; transform:scale(1); }
}
@keyframes oceanGlow {
  0%,100% { opacity:.7; }
  50%     { opacity:1; }
}
.sb-item.ocean-active .sb-item-dot {
  background: currentColor !important;
  opacity: 1 !important;
  animation: oceanPulse 2.2s ease-in-out infinite;
}
.sb-item.ocean-deselected {
  opacity: .3;
  transition: opacity .2s;
}
.sb-item.ocean-deselected:hover {
  opacity: .65;
}
.sb-item.ocean-deselected .sb-item-dot {
  background: transparent !important;
  opacity: .3 !important;
}
/* Pulsing glow on selected ocean label */
.sb-item.ocean-active .sb-item-label {
  animation: oceanGlow 2.2s ease-in-out infinite;
}

/* ═══════════════════════════════════════
   RIGHT SIDEBAR — LIST PANEL
═══════════════════════════════════════ */
:root { --rp-width: 300px; }

.right-panel {
  width: var(--rp-width); flex-shrink:0;
  background:#F8FAFC;
  border-left:1px solid #E2E8F0;
  display:flex; flex-direction:column;
  overflow:hidden;

  ocean:0, wave:.12, tide:.24, flow:.36,
  ripple:.46, drip:.54, drop:.62, trickle:.68, dribble:.74, h2o:.80,
};

function lightenHex(hex, factor){
  const h=hex.replace('#','');
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return '#'+[r,g,b].map(c=>Math.round(c+(255-c)*factor).toString(16).padStart(2,'0')).join('');
}

function getNodeColor(levelKey, oceanId){
  const base = OCEAN_COLORS[oceanId] || '#0EA5E9';
  return lightenHex(base, LEVEL_LIGHTEN[levelKey]||0);

function setOcean(id){
  activeOcean = id;
  // Clear all sub-filters when switching ocean
  Object.keys(filters).forEach(k => filters[k].clear());
  renderAll();
}

/* ═══════════════════════════════════════
   FILTER HELPERS
═══════════════════════════════════════ */
function getFilteredTasks(){
  let items = tasks.filter(t => t.ocean === activeOcean);
  if(filters.wave.size)   items=items.filter(t=>filters.wave.has(t.wave));
  if(filters.tide.size)   items=items.filter(t=>filters.tide.has(t.tide));
  if(filters.flow.size)   items=items.filter(t=>filters.flow.has(t.flow));
  if(filters.motion.size) items=items.filter(t=>filters.motion.has(t.motionId));
  if(filters.urgency.size)items=items.filter(t=>filters.urgency.has(String(t.urgency)));
  if(filters.state.size)  items=items.filter(t=>filters.state.has(t.state));
  if(filters.focus.size)  items=items.filter(t=>filters.focus.has(t.focus));
  if(filters.action.size) items=items.filter(t=>filters.action.has(t.action));
  if(filters.abcde.size)  items=items.filter(t=>filters.abcde.has(t.abcde));
  if(filters.location.size)items=items.filter(t=>filters.location.has(t.location));
  if(activeTime==='today')   items=items.filter(t=>t.due===todayStr());
  if(activeTime==='week'){const e=dateOffset(7);items=items.filter(t=>t.due&&t.due>=todayStr()&&t.due<=e);}
  if(activeTime==='overdue') items=items.filter(t=>t.due&&t.due<todayStr());
  return items;
}

// Get nodes for current ocean only, respecting sidebar filters
function getVisibleNodes(levelKey){
  const all = HIERARCHY.find(h=>h.key===levelKey)?.data()||[];
  // All nodes must belong to activeOcean
  let result = all.filter(n=>n.oceanId===activeOcean);
  // Apply direct filter on this level
  const f = filters[levelKey];
  if(f&&f.size) result=result.filter(n=>f.has(n.id));
  // Apply parent filters by walking up through direct parent field
  let curKey=levelKey;
  while(PARENT_KEY[curKey]){
    const pk=PARENT_KEY[curKey];
    const pf=PARENT_FIELD[curKey];
    if(filters[pk]?.size){
      result=result.filter(n=>filters[pk].has(n[pf]));
    }
    curKey=pk;
  }
  return result;
}

function toggleFilter(group, val){
  if(filters[group].has(val)) filters[group].delete(val);
  else filters[group].add(val);
  renderAll();
}

═══════════════════════════════════════ */
function nodeColor(levelKey, node){
  return getNodeColor(levelKey, node.oceanId||activeOcean);
}

function urgColor(u){
  if(!u) return 'var(--muted)';
  if(u>=8) return 'var(--urg-high)';
  if(u>=5) return 'var(--urg-mid)';
  return 'var(--urg-low)';
}

function motionColor(t){
  return MOTIONS.find(m=>m.id===t.motionId)?.color||'var(--muted)';
}

function formatDue(d){
  if(!d) return '';
  const diff=Math.round((new Date(d)-new Date(todayStr()))/(1000*60*60*24));
  if(diff<0) return `${Math.abs(diff)}d overdue`;
  if(diff===0) return 'Today';
  if(diff===1) return 'Tomorrow';
  return `in ${diff}d`;
}

  {key:'state',    label:'State',    color:'#C8D8EE'},
  {key:'focus',    label:'Focus',    color:'#C8D8EE'},

  else if(t==='wave')   inner=`<svg width="26" height="12" viewBox="0 0 26 12" fill="none"><path d="M1 3 Q4 0 7 3 Q10 6 13 3 Q16 0 19 3 Q22 6 25 3" stroke="${c}" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M1 9 Q4 6 7 9 Q10 12 13 9 Q16 6 19 9 Q22 12 25 9" stroke="${c}" stroke-width="2" stroke-linecap="round" fill="none" opacity=".55"/></svg>`;
  else if(t==='tide')   inner=`<svg width="26" height="8" viewBox="0 0 26 8" fill="none"><path d="M1 4 Q4 0 7 4 Q10 8 13 4 Q16 0 19 4 Q22 8 25 4" stroke="${c}" stroke-width="2.2" stroke-linecap="round" fill="none"/></svg>`;
  else if(t==='flow')   inner=`<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 11 C11 11 16 11 16 7.5 C16 4.5 13 3 10.5 4 C8 5 6.5 7.5 7.5 10 C8.5 12.5 11 13.5 13.5 12.5 C16 11.5 17.5 9 16.5 6.5 C15.5 4 13 2.5 10 2.5 C7 2.5 4.5 4 3.5 6.5 C2.5 9 3 12 4.5 14 C6 16 8.5 17.5 11 17.5 C13.5 17.5 16 16.5 17.5 14.5 C19 12.5 19.5 10 19 7.5" stroke="${c}" stroke-width="2" stroke-linecap="round" fill="none"/></svg>`;
  else if(t==='ripple') inner=`<svg width="26" height="26" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="2.5" fill="${c}"/><circle cx="13" cy="13" r="6" stroke="${c}" stroke-width="2" fill="none" opacity=".85"/><circle cx="13" cy="13" r="11" stroke="${c}" stroke-width="1.6" fill="none" opacity=".55"/></svg>`;
  else if(t==='drip')   inner=`<div style="width:8px;height:8px;border-radius:50%;background:${c};"></div>`;
  else if(t==='drop')   inner=`<div style="display:flex;gap:5px;"><div style="width:7px;height:7px;border-radius:50%;background:${c};"></div><div style="width:7px;height:7px;border-radius:50%;background:${c};opacity:.7;"></div></div>`;
  else if(t==='trickle')inner=`<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 1C11 1 8.5 4.5 8.5 6.2C8.5 7.8 9.6 9 11 9C12.4 9 13.5 7.8 13.5 6.2C13.5 4.5 11 1 11 1Z" fill="${c}"/><path d="M17.5 13.5C17.5 13.5 15 17 15 18.7C15 20.3 16.1 21.5 17.5 21.5C18.9 21.5 20 20.3 20 18.7C20 17 17.5 13.5 17.5 13.5Z" fill="${c}" opacity=".75"/><path d="M4.5 13.5C4.5 13.5 2 17 2 18.7C2 20.3 3.1 21.5 4.5 21.5C5.9 21.5 7 20.3 7 18.7C7 17 4.5 13.5 4.5 13.5Z" fill="${c}" opacity=".5"/></svg>`;
  else if(t==='dribble')inner=`<div style="display:flex;gap:3px;">${[1,1,1,1].map((_,i)=>`<div style="width:4px;height:4px;border-radius:50%;background:${c};opacity:${1-i*.18};"></div>`).join('')}</div>`;
  else if(t==='h2o')    inner=`<svg width="18" height="22" viewBox="0 0 18 22" fill="none"><path d="M9 1C9 1 1 10 1 14.5C1 18.6 4.7 22 9 22C13.3 22 17 18.6 17 14.5C17 10 9 1 9 1Z" fill="${c}"/><path d="M5 15C5 12.5 7 10.5 9.5 10" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".35"/></svg>`;
  else if(t==='location')inner=`<svg width="14" height="18" viewBox="0 0 14 18" fill="${c}"><path d="M7 0C3.1 0 0 3.1 0 7c0 5.25 7 11 7 11s7-5.75 7-11c0-3.9-3.1-7-7-7zm0 9.5c-1.4 0-2.5-1.1-2.5-2.5S5.6 4.5 7 4.5s2.5 1.1 2.5 2.5S8.4 9.5 7 9.5z"/></svg>`;

  else if(t==='focus')   inner=`<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="${c}" stroke-width="1.8"><circle cx="8" cy="8" r="7"/><circle cx="8" cy="8" r="3"/></svg>`;
  else if(t==='action')  inner=`<svg width="16" height="14" viewBox="0 0 16 14" fill="${c}"><path d="M0 0h6v14H0zM10 0l6 7-6 7z" opacity=".85"/></svg>`;

  const hasActive = filters[s.key]?.size>0 || (s.key==='ocean');
  return `<div id="railicon_${s.key}" class="sb-rail-icon${hasActive?' active':''}" style="color:${c};min-height:44px;"

    ${inner}

}

function renderRail(){
  const rail=document.getElementById('sbRail');
  if(!rail) return;
  rail.innerHTML=RAIL_SECTIONS.map(s=>makeRailIcon(s)).join('');
}

function clickRailIcon(key){
  const sb=document.getElementById('sidebar');
  sb?.classList.add('expanded');
  sidebarOpen[key]=!sidebarOpen[key];
  renderSidebar();
  if(sidebarOpen[key]){
    setTimeout(()=>{
      const el=document.getElementById('sbsec_'+key);
      const scroll=document.getElementById('sidebarScroll');
      if(el&&scroll) scroll.scrollTo({top:el.offsetTop,behavior:'smooth'});
    },40);
  }
}

/* ═══════════════════════════════════════
   RENDER SIDEBAR
═══════════════════════════════════════ */
function toggleSection(key){
  sidebarOpen[key]=!sidebarOpen[key];
  renderSidebar();
  if(sidebarOpen[key]){
    setTimeout(()=>{
      const el=document.getElementById('sbsec_'+key);
      const scroll=document.getElementById('sidebarScroll');
      if(el&&scroll) scroll.scrollTo({top:el.offsetTop,behavior:'smooth'});
    },60);
  }
}

function secHdr(key, label, color){
  const open=sidebarOpen[key];
  const cnt=filters[key]?.size||0;
  return `<div class="sb-section${open?' open':''}" id="sbsec_${key}">
    <div class="sb-section-hdr" style="${open?`background:${color}22;border-bottom:1px solid ${color}44;`:''}" onclick="toggleSection('${key}')">
      <span class="sb-section-title" style="color:${color}">${label}</span>
      ${cnt?`<span style="font-family:var(--font-mono);font-size:9px;color:${color};margin-left:4px;">● ${cnt}</span>`:''}
    </div>`;
}

function sbItem(color, label, active, onclick){
  return `<div class="sb-item${active?' active':''}" style="color:${color}" onclick="${onclick}">
    <div class="sb-item-dot" style="background:${active?color:'transparent'};border-color:${color};${active?'box-shadow:0 0 6px '+color:''};"></div>
    <span class="sb-item-label">${label}</span>
  </div>`;
}

function renderSidebar(){
  const el=document.getElementById('sidebarScroll');
  if(!el) return;
  const oc=OCEANS.find(o=>o.id===activeOcean);
  const oceanColor=oc?.color||'#0EA5E9';
  let html='';

  /* ── OCEANS ── */
  html+=secHdr('ocean','Oceans','#0EA5E9');
  if(sidebarOpen.ocean){
    html+=`<div class="sb-items">`;
    OCEANS.forEach(o=>{
      const active=activeOcean===o.id;
      const cnt=tasks.filter(t=>t.ocean===o.id).length;
      html+=`<div class="sb-item${active?' active ocean-active':''}" style="color:${o.color};cursor:pointer;" onclick="setOcean('${o.id}')">
        <div class="sb-item-dot" style="background:${active?o.color:'transparent'};border-color:${o.color};${active?'animation:oceanPulse 2.2s ease-in-out infinite;box-shadow:0 0 8px '+o.color:''}"></div>
        <span class="sb-item-label" style="font-weight:${active?700:400};">${o.label}</span>
        <span class="sb-item-count" style="color:${o.color};opacity:.6;">${cnt}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;

  // All sub-levels use activeOcean's color cascade
  const lvls=[
    {key:'wave',    label:'Waves',    data:WAVES.filter(w=>w.oceanId===activeOcean), parentKey:null},
    {key:'tide',    label:'Tides',    data:null, parentKey:'wave'},
    {key:'flow',    label:'Flows',    data:null, parentKey:'tide'},
    {key:'ripple',  label:'Ripples',  data:null, parentKey:'flow'},
    {key:'drip',    label:'Drips',    data:null, parentKey:'ripple'},
    {key:'drop',    label:'Drops',    data:null, parentKey:'drip'},
    {key:'trickle', label:'Trickles', data:null, parentKey:'drop'},
    {key:'dribble', label:'Dribbles', data:null, parentKey:'trickle'},
    {key:'h2o',     label:'H2O',      data:null, parentKey:'dribble'},
  ];

  lvls.forEach(lvl=>{
    const lc=getNodeColor(lvl.key,activeOcean);
    html+=secHdr(lvl.key,lvl.label,lc);
    if(sidebarOpen[lvl.key]){
      const nodes=getVisibleNodes(lvl.key);
      html+=`<div class="sb-items">`;
      if(nodes.length===0){
        html+=`<div style="padding:10px 20px;font-size:13px;color:var(--muted);font-style:italic;">No ${lvl.label.toLowerCase()} yet</div>`;
      } else {
        nodes.forEach(n=>{
          const active=filters[lvl.key].has(n.id);
          html+=sbItem(lc,n.label,active,`toggleFilter('${lvl.key}','${n.id}')`);
        });
      }
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  /* ── FILTER SECTIONS ── */
  const filterSecs=[
    {key:'location',label:'Location', vals:['Office','Home','On the Move','Behind Computer','Car','Gym','Client Site','Coffee Shop','Co-working Space','Field']},
    {key:'state',   label:'State',    vals:['In Progress','Waiting For Response','Review Required','Completed','On Hold','Cancelled','Delegated','Deferred','Blocked','Not Started']},
    {key:'focus',   label:'Focus',    vals:['Deep Work','Shallow Work','Brain Dead','Flow State','Creative','Collaborative','Administrative','Learning']},
    {key:'action',  label:'Action',   vals:['Do','Defer','Delegate','Delete']},
    {key:'urgency', label:'Urgency',  vals:['9','8','7','6','5','4','3','2','1']},
    {key:'abcde',   label:'ABCDE',    vals:['A','B','C','D','E']},
  ];
  filterSecs.forEach(fs=>{
    const filtered=getFilteredTasks();
    html+=secHdr(fs.key,fs.label,'#C8D8EE');
    if(sidebarOpen[fs.key]){
      html+=`<div class="sb-items">`;
      fs.vals.forEach(v=>{
        const active=filters[fs.key].has(v);
        const cnt=filtered.filter(t=>{
          if(fs.key==='location') return t.location===v;
          if(fs.key==='state') return t.state===v;
          if(fs.key==='focus') return t.focus===v;
          if(fs.key==='action') return t.action===v;
          if(fs.key==='urgency') return String(t.urgency)===v;
          if(fs.key==='abcde') return t.abcde===v;
          return false;
        }).length;
        if(!cnt&&!active) return;
        html+=`<div class="sb-filter-item${active?' active':''}" onclick="toggleFilter('${fs.key}','${v}')">
          <span class="sb-filter-label">${v}</span>
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted);">${cnt}</span>
        </div>`;
      });
      html+=`</div>`;
    }
    html+=`</div>`;
  });

  el.innerHTML=html;
}

/* ═══════════════════════════════════════
   BLOCK VIEW
═══════════════════════════════════════ */
let expandedTasks=new Set();
function toggleTask(id){
  if(expandedTasks.has(id)) expandedTasks.delete(id);
  else expandedTasks.add(id);
  renderBlock();
}
function toggleGroup(id){
  const el=document.getElementById('mt_'+id);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}
function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  expandedTasks.delete(id);
  renderAll();
}
function addUpdate(id){
  const inp=document.getElementById('upd_'+id);
  if(!inp?.value.trim()) return;
  const t=tasks.find(x=>x.id===id);
  if(t){
    if(!t.updates) t.updates=[];
    const now=new Date();
    t.updates.unshift(`${now.toLocaleDateString()} ${now.toLocaleTimeString()} - ${inp.value.trim()}`);
    inp.value='';
    renderBlock();
  }
}
function patchTask(id,field,val){
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  if(field==='urgency'||field==='phase') t[field]=parseInt(val)||0;
  else t[field]=val;
  const lbl=document.querySelector(`#tr_${id} .task-label`);
  if(lbl&&field==='label') lbl.textContent=val;
  showSaveToast();
}

function renderTaskCard(t){
  const mc=motionColor(t);
  const inp=(name,val,ph)=>`<input class="task-field-input" type="text" value="${val||''}" placeholder="${ph||name}" onchange="patchTask('${t.id}','${name}',this.value)">`;
  const sel=(name,val,opts)=>`<select class="task-field-input" onchange="patchTask('${t.id}','${name}',this.value)">${opts.map(o=>`<option value="${o}"${val===o?' selected':''}>${o||'—'}</option>`).join('')}</select>`;
  const num=(name,val)=>`<input class="task-field-input" type="number" min="1" max="9" value="${val||''}" placeholder="1-9" onchange="patchTask('${t.id}','${name}',parseInt(this.value)||0)" style="width:60px;">`;

  const ocean=OCEANS.find(o=>o.id===t.ocean);
  const wave=WAVES.find(w=>w.id===t.wave);
  const tide=TIDES.find(td=>td.id===t.tide);
  const breadParts=[
    ocean?{label:ocean.label,color:ocean.color}:null,
    wave ?{label:wave.label, color:getNodeColor('wave',activeOcean)}:null,
    tide ?{label:tide.label, color:getNodeColor('tide',activeOcean)}:null,
  ].filter(Boolean);

  const listsHtml=(t.lists&&t.lists.length)?`
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);">
      <div style="font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#8BAABF;margin-bottom:8px;">Lists</div>
      <div class="task-list-chips">
        ${(t.lists||[]).map(lid=>{const l=LISTS.find(x=>x.id===lid);return l?`<div class="task-list-chip" onclick="openListPanel('${t.id}','${lid}');event.stopPropagation();">☰ ${l.name}</div>`:''}).join('')}
        <div class="task-list-chip" style="border-style:dashed;color:#8BAABF;" onclick="openAttachListModal('${t.id}');event.stopPropagation();">+ Attach</div>
      </div>
    </div>`:`<div style="margin-top:8px;"><button class="task-card-btn" onclick="openAttachListModal('${t.id}');event.stopPropagation();" style="font-size:11px;">+ Attach List</button></div>`;

  return `<div class="task-card" id="tc_${t.id}">
    ${breadParts.length?`<div class="task-hier">${breadParts.map((p,i)=>`${i>0?'<span class="task-hier-sep">›</span>':''}<span class="task-hier-chip" style="color:${p.color};border-color:${p.color}55;">${p.label}</span>`).join('')}</div>`:''}
    <div class="task-card-grid">
      <div class="task-field"><span class="task-field-label">Motion</span>${sel('motionId',t.motionId,['','phone','email','sms','onthego','virtual','ops','research','dev','build','maint','creative','learning'])}</div>
      <div class="task-field"><span class="task-field-label">State</span>${sel('state',t.state,['','In Progress','Waiting For Response','Review Required','Completed','On Hold','Cancelled','Delegated','Deferred','Blocked','Not Started'])}</div>
      <div class="task-field"><span class="task-field-label">Urgency</span>${num('urgency',t.urgency)}</div>
      <div class="task-field"><span class="task-field-label">Action</span>${sel('action',t.action,['','Do','Defer','Delegate','Delete'])}</div>
      <div class="task-field"><span class="task-field-label">Focus</span>${sel('focus',t.focus,['','Deep Work','Shallow Work','Brain Dead','Flow State','Creative','Collaborative','Administrative','Learning'])}</div>
      <div class="task-field"><span class="task-field-label">ABCDE</span>${sel('abcde',t.abcde,['','A','B','C','D','E'])}</div>
      <div class="task-field"><span class="task-field-label">Phase</span>${sel('phase',String(t.phase||''),['','1','2','3','4','5','6','7','8','9'])}</div>
      <div class="task-field"><span class="task-field-label">Due</span><input class="task-field-input" type="date" value="${t.due||''}" onchange="patchTask('${t.id}','due',this.value)"></div>
      <div class="task-field"><span class="task-field-label">Location</span>${sel('location',t.location,['','Office','Home','On the Move','Behind Computer','Car','Gym','Client Site','Coffee Shop','Co-working Space','Field'])}</div>
      <div class="task-field"><span class="task-field-label">Assignee</span>${inp('assignee',t.assignee,'Name...')}</div>
    </div>
    <div class="task-field" style="margin-bottom:14px;">
      <span class="task-field-label">Label</span>
      <input class="task-field-input" type="text" value="${t.label||''}" style="font-size:15px;font-weight:600;" onchange="patchTask('${t.id}','label',this.value)">
    </div>
    <div class="task-field" style="margin-bottom:14px;">
      <span class="task-field-label">Notes</span>
      <textarea class="task-field-input" rows="2" style="resize:vertical;" onchange="patchTask('${t.id}','note',this.value)">${t.note||''}</textarea>
    </div>
    <div class="task-updates">
      <div class="task-updates-hdr">Updates</div>
      ${(t.updates||[]).map(u=>`<div class="task-update-row"><span class="task-update-time">${u.split(' - ')[0]||''}</span><span>${u.split(' - ').slice(1).join(' - ')||u}</span></div>`).join('')||'<div style="font-size:12px;color:#8BAABF;padding:4px 0;">No updates yet.</div>'}
      <div class="task-update-add" style="margin-top:10px;">
        <input class="task-update-input" id="upd_${t.id}" placeholder="Add an update..." onkeydown="if(event.key==='Enter')addUpdate('${t.id}')">

      <div style="flex:1"></div>
      <button class="task-card-btn" onclick="toggleTask('${t.id}')">Close</button>
    </div>

}

function renderTaskRow(t){
  const m=MOTIONS.find(x=>x.id===t.motionId);
  const mc=motionColor(t);
  const uc=urgColor(t.urgency);
  const oc=getNodeColor('ocean',t.ocean);
  const wave=WAVES.find(w=>w.id===t.wave);
  const tide=TIDES.find(td=>td.id===t.tide);
  const bread=[
    wave?wave.label:null,
    tide?tide.label:null,
  ].filter(Boolean).join(' › ');
  const dueStr=formatDue(t.due);
  const dueColor=t.due&&t.due<todayStr()?'var(--urg-high)':t.due===todayStr()?'var(--urg-mid)':'var(--muted)';
  const expanded=expandedTasks.has(t.id);

  return `<div class="task-row" id="tr_${t.id}">
    <div class="task-collapsed" onclick="toggleTask('${t.id}')">
      <div class="task-dot" style="color:${mc};background:${mc};box-shadow:0 0 6px ${mc};"></div>
      <span class="task-label">${t.label}</span>
      ${bread?`<span class="task-breadcrumb">${bread}</span>`:''}
      <div class="task-badges">
        ${t.abcde?`<span class="task-badge" style="color:var(--motion);border-color:rgba(212,120,10,.4);">${t.abcde}</span>`:''}
        ${t.urgency?`<span class="task-badge" style="color:${uc};border-color:${uc}66;">${t.urgency}</span>`:''}
        ${dueStr?`<span style="font-family:var(--font-mono);font-size:10px;color:${dueColor};">${dueStr}</span>`:''}
        ${t.state==='Waiting For Response'?`<span class="task-badge" style="color:var(--urg-mid);border-color:rgba(245,158,11,.4);">⏳</span>`:''}
        ${t.state==='Completed'?`<span class="task-badge" style="color:#10B981;border-color:rgba(16,185,129,.4);">✓</span>`:''}
      </div>
      <button class="task-expand-btn" onclick="event.stopPropagation();toggleTask('${t.id}')">▼</button>
    </div>
    ${expanded?renderTaskCard(t):''}
  </div>`;
}

function renderBlock(){
  const el=document.getElementById('blockScroll');
  if(!el) return;
  const filtered=getFilteredTasks();
  const activeMotions=filters.motion.size?MOTIONS.filter(m=>filters.motion.has(m.id)):MOTIONS;
  let html='';
  activeMotions.forEach(m=>{
    const mtasks=filtered.filter(t=>t.motionId===m.id);
    if(!mtasks.length) return;
    html+=`<div class="motion-group" id="mg_${m.id}">
      <div class="motion-group-hdr" style="color:${m.color};" onclick="toggleGroup('${m.id}')">
        <div class="motion-group-icon">${m.icon}</div>
        <span class="motion-group-name">${m.label}</span>
        <span class="motion-group-count">${mtasks.length}</span>
        <span class="motion-group-caret">▼</span>
      </div>

let olSelected={}, olScrollX=0, olPopupTask=null;

function olSelectNode(levelKey,nodeId,e){
  e?.stopPropagation();
  if(olSelected[levelKey]===nodeId){
    const idx=HIERARCHY.findIndex(h=>h.key===levelKey);
    for(let i=idx;i<HIERARCHY.length;i++) delete olSelected[HIERARCHY[i].key];
  } else {
    const idx=HIERARCHY.findIndex(h=>h.key===levelKey);
    for(let i=idx;i<HIERARCHY.length;i++) delete olSelected[HIERARCHY[i].key];
    olSelected[levelKey]=nodeId;
  }
  closeTaskDrawer();
  renderOutlook();
}

function olShowTask(id,e){
  e?.stopPropagation();
  const t=tasks.find(x=>x.id===id);
  if(!t) return;
  olPopupTask=id;
  const mc=motionColor(t);
  const drawer=document.getElementById('taskDrawer');
  const dot=document.getElementById('drawerDot');
  const title=document.getElementById('drawerTitle');
  const body=document.getElementById('drawerBody');
  if(dot) dot.style.background=mc;
  if(title) title.textContent=t.label;
  if(body) body.innerHTML=renderTaskCard(t);
  if(drawer) drawer.style.display='flex';
}

function closeTaskDrawer(){
  olPopupTask=null;
  const drawer=document.getElementById('taskDrawer');
  if(drawer) drawer.style.display='none';
}

document.addEventListener('click',e=>{
  const drawer=document.getElementById('taskDrawer');
  if(drawer&&drawer.style.display!=='none'&&!drawer.contains(e.target)&&!e.target.closest('.ol-node')&&!e.target.closest('.ov-node')){
    closeTaskDrawer();
  }
});

function renderOutlook(){
  const canvas=document.getElementById('outlookCanvas');
  const svg=document.getElementById('outlookSvg');
  if(!canvas||!svg) return;
  canvas.style.transform=`translateX(${olScrollX}px)`;

  // All nodes for active ocean only, filtered by sidebar + selection
  const cols=HIERARCHY.map(level=>{
    let items=level.data().filter(n=>n.oceanId===activeOcean);
    // Sidebar filters
    const f=filters[level.key];
    if(f&&f.size) items=items.filter(n=>f.has(n.id));
    // Selection cascade — if parent is selected, only show children of that parent
    const pk=PARENT_KEY[level.key];
    const pf=PARENT_FIELD[level.key];
    if(pk&&pf&&olSelected[pk]){
      items=items.filter(n=>n[pf]===olSelected[pk]);
    }
    return {level,items};
  }).filter(col=>col.items.length>0);

  let html='';
  cols.forEach((col,ci)=>{
    const {level,items}=col;
    const selId=olSelected[level.key];
    const lc=getNodeColor(level.key,activeOcean);
    const nextLevel=HIERARCHY[HIERARCHY.findIndex(h=>h.key===level.key)+1];
    html+=`<div class="ol-col" id="olcol_${level.key}">
      <div class="ol-col-hdr" style="color:${lc};border-color:${lc};">${level.label}</div>
      <div class="ol-col-items">`;
    items.forEach(node=>{
      const isSelected=selId===node.id;
      html+=`<div class="ol-node${isSelected?' selected':''}"
        id="olnode_${level.key}_${node.id}"
        style="color:${lc};"
        onclick="olSelectNode('${level.key}','${node.id}',event)">
        <div class="ol-node-dot"></div>
        <span class="ol-node-label">${node.label}</span>
      </div>`;
    });
    // Tasks at this level if selected
    if(selId){
      const selNode=items.find(n=>n.id===selId);
      const directT=getFilteredTasks().filter(t=>{
        if(level.key==='wave') return t.wave===selId&&!t.tide;
        if(level.key==='tide') return t.tide===selId&&!t.flow;
        if(level.key==='flow') return t.flow===selId;
        return false;
      });
      if(directT.length){
        html+=`<div class="ol-unassigned-hdr">Tasks (${directT.length})</div>`;
        directT.forEach(t=>{
          const uc=urgColor(t.urgency);
          html+=`<div class="ol-node" style="color:${motionColor(t)};opacity:.85;" onclick="olShowTask('${t.id}',event)">
            <div class="ol-node-dot"></div>
            <span class="ol-node-label" style="font-size:13px;">${t.label}</span>
            ${t.urgency?`<span class="ol-node-badge" style="color:${uc};">${t.urgency}</span>`:''}
          </div>`;
        });
      }
    }
    html+=`</div></div>`;
  });
  canvas.innerHTML=html;
  requestAnimationFrame(()=>drawOlConnectors(svg,cols));
}

function drawOlConnectors(svg,cols){
  svg.innerHTML='';
  for(let ci=0;ci<cols.length-1;ci++){
    const col=cols[ci];
    const nextCol=cols[ci+1];
    const selId=olSelected[col.level.key];
    if(!selId) continue;
    const fromNode=document.getElementById(`olnode_${col.level.key}_${selId}`);
    if(!fromNode) continue;
    const fr=fromNode.getBoundingClientRect();
    const x1=fr.right, y1=fr.top+fr.height/2;
    const pf=PARENT_FIELD[nextCol.level.key];
    nextCol.items.forEach(child=>{
      if(pf&&child[pf]!==selId) return;
      const toNode=document.getElementById(`olnode_${nextCol.level.key}_${child.id}`);
      if(!toNode) return;
      const tr=toNode.getBoundingClientRect();
      const x2=tr.left, y2=tr.top+tr.height/2;
      const cx=(x1+x2)/2;
      const lc=getNodeColor(nextCol.level.key,activeOcean);
      const isSel=olSelected[nextCol.level.key]===child.id;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
      path.setAttribute('stroke',lc);
      path.setAttribute('stroke-width',isSel?'2.5':'1.5');
      path.setAttribute('fill','none');
      path.setAttribute('opacity',isSel?'.85':'.28');
      svg.appendChild(path);
    });
  }
  svg.setAttribute('width',window.innerWidth);
  svg.setAttribute('height',window.innerHeight);
}

// Outlook scroll
document.addEventListener('DOMContentLoaded',()=>{
  const wrap=document.getElementById('outlookWrap');
  if(wrap){
    let isDragging=false,startX=0,startScroll=0;
    wrap.addEventListener('mousedown',e=>{if(e.button!==0||e.target.closest('.ol-node,.ol-col-hdr')) return;isDragging=true;startX=e.clientX;startScroll=olScrollX;wrap.style.cursor='grabbing';});
    document.addEventListener('mousemove',e=>{if(!isDragging) return;olScrollX=startScroll+(e.clientX-startX);const canvas=document.getElementById('outlookCanvas');if(canvas) canvas.style.transform=`translateX(${olScrollX}px)`;const svg=document.getElementById('outlookSvg');if(svg&&activeView==='outlook') drawOlConnectors(svg,getCurrentOlCols());});
    document.addEventListener('mouseup',()=>{if(isDragging){isDragging=false;const wrap=document.getElementById('outlookWrap');if(wrap) wrap.style.cursor='grab';}});
    wrap.style.cursor='grab';
  }
  document.getElementById('overviewScroll')?.addEventListener('scroll',()=>{

function renderOverview(){
  const scroll=document.getElementById('overviewScroll');
  const svg=document.getElementById('overviewSvg');
  if(!scroll||!svg) return;

  const rows=HIERARCHY.map(level=>{
    let items=level.data().filter(n=>n.oceanId===activeOcean);
    // Apply sidebar filters
    const f=filters[level.key];

    // Selection cascade — only show children of selected parent
    const pk=PARENT_KEY[level.key];
    const pf=PARENT_FIELD[level.key];
    if(pk&&pf&&ovSelected[pk]){
      items=items.filter(n=>n[pf]===ovSelected[pk]);
    }

  }).filter(r=>r.items.length>0);

  let html='';

    const {level,items}=row;

    html+=`<div class="ov-row" id="ovrow_${ri}">
      <div style="font-family:var(--font-display);font-size:11px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:${lc};opacity:.8;margin-bottom:6px;">${level.label}</div>
      <div class="ov-row-nodes" id="ovnodes_${ri}">`;
    items.forEach(node=>{
      const isSelected=selId===node.id;
      html+=`<div class="ov-node${isSelected?' selected':''}"
        id="ovnode_${level.key}_${node.id}"
        style="color:${lc};border-color:${isSelected?lc+'66':'rgba(255,255,255,.07)'};${isSelected?`background:${lc}18;box-shadow:0 4px 20px ${lc}22;`:''}"
        onclick="ovSelectNode('${level.key}','${node.id}',event)">
        <div class="ov-node-dot" style="${isSelected?`background:${lc};box-shadow:0 0 8px ${lc};`:''}"></div>
        <span class="ov-node-label">${node.label}</span>
      </div>`;
    });
    html+=`</div></div>`;
    // Tasks at selected node
    if(selId){
      const directT=getFilteredTasks().filter(t=>{
        if(level.key==='wave') return t.wave===selId&&!t.tide;
        if(level.key==='tide') return t.tide===selId&&!t.flow;
        if(level.key==='flow') return t.flow===selId;
        return false;
      });
      if(directT.length){
        html+=`<div class="ov-unassigned" style="margin-left:0;margin-top:6px;">
          <div class="ov-unassigned-lbl">Tasks (${directT.length})</div>
          ${directT.map(t=>{const mc=motionColor(t);return `<div class="ov-task-chip" onclick="olShowTask('${t.id}',event)" style="color:${mc};border-color:${mc}44;"><div class="ov-node-dot" style="border-color:${mc};background:${mc};box-shadow:0 0 5px ${mc};"></div>${t.label}</div>`;}).join('')}
        </div>`;
      }
    }
  });
  if(!html) html=`<div style="padding:40px;text-align:center;color:var(--muted);font-family:var(--font-display);font-size:16px;">No nodes for this ocean yet.</div>`;
  scroll.innerHTML=html;
  requestAnimationFrame(()=>drawOvConnectors(svg,rows));
}

function drawOvConnectors(svg,rows){
  svg.innerHTML='';
  for(let ri=0;ri<rows.length-1;ri++){
    const row=rows[ri],nextRow=rows[ri+1];
    const selId=ovSelected[row.level.key];
    if(!selId) continue;
    const fromNode=document.getElementById(`ovnode_${row.level.key}_${selId}`);
    if(!fromNode) continue;
    const fr=fromNode.getBoundingClientRect();
    const x1=fr.left+fr.width/2,y1=fr.bottom;
    const pf=PARENT_FIELD[nextRow.level.key];
    const lc=getNodeColor(nextRow.level.key,activeOcean);
    nextRow.items.forEach(child=>{
      if(pf&&child[pf]!==selId) return;
      const toNode=document.getElementById(`ovnode_${nextRow.level.key}_${child.id}`);
      if(!toNode) return;
      const tr=toNode.getBoundingClientRect();
      if(tr.top>window.innerHeight||tr.bottom<0) return;
      const x2=tr.left+tr.width/2,y2=tr.top;
      const cy=(y1+y2)/2;
      const isSel=ovSelected[nextRow.level.key]===child.id;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}`);
      path.setAttribute('stroke',lc);
      path.setAttribute('stroke-width',isSel?'2.5':'1.5');
      path.setAttribute('fill','none');
      path.setAttribute('opacity',isSel?'.85':'.28');
      svg.appendChild(path);
    });
  }
  svg.setAttribute('width',window.innerWidth);
  svg.setAttribute('height',window.innerHeight);
}

function getCurrentOvCols(){
  return HIERARCHY.map(level=>{
    let items=level.data().filter(n=>n.oceanId===activeOcean);

    const pf=PARENT_FIELD[level.key];
    if(pk&&pf&&ovSelected[pk]) items=items.filter(n=>n[pf]===ovSelected[pk]);

  }).filter(r=>r.items.length>0);
}

function updateTideSelect(){

}

function closeModal(){
  document.getElementById('taskModal').style.display='none';
}

function submitModal(){
  const label=document.getElementById('m_label')?.value.trim();
  if(!label) return;
  const waveId=document.getElementById('m_wave')?.value||'';
  const tideId=document.getElementById('m_tide')?.value||'';
  const wave=WAVES.find(w=>w.id===waveId);
  const tide=TIDES.find(t=>t.id===tideId);
  const newTask={
    id:mkId(), label,
    motionId:document.getElementById('m_motion')?.value||'ops',
    ocean:activeOcean,

    abcde:document.getElementById('m_abcde')?.value||'',

    due:document.getElementById('m_due')?.value||'',
    state:'In Progress', focus:'Shallow Work', phase:1,
    location:'', resources:'', note:'', updates:[],

function renderRightPanel(){

        <div class="rp-item-check" onclick="rpToggleItem('${activeList.id}','${sec.id}','${item.id}')"><span class="rp-item-check-mark">✓</span></div>
        <span class="rp-item-name">${item.name}</span>
        <div class="rp-qty">
          <button class="rp-qty-btn" onclick="rpQty('${activeList.id}','${sec.id}','${item.id}',-1)">−</button>
          <span class="rp-qty-val">${item.qty}</span>
          <button class="rp-qty-btn" onclick="rpQty('${activeList.id}','${sec.id}','${item.id}',1)">+</button>
        </div>
        ${hasSubs?`<button style="font-size:10px;border:none;background:none;cursor:pointer;color:#94A3B8;padding:0 4px;" onclick="rpToggleSubs('${item.id}')">▾</button>`:''}
      </div>`;
      if(hasSubs){
        html+=`<div class="rp-subitems" id="rpsubs_${item.id}">`;

          html+=`<div class="rp-subitem${sub.done?' done':''}">
            <div class="rp-item-check" style="width:16px;height:16px;border-radius:4px;" onclick="rpToggleSub('${activeList.id}','${sec.id}','${item.id}','${sub.id}')"><span class="rp-item-check-mark" style="font-size:9px;">✓</span></div>
            <span class="rp-subitem-name">${sub.name}</span>
            <div class="rp-qty">
              <button class="rp-qty-btn" onclick="rpSubQty('${activeList.id}','${sec.id}','${item.id}','${sub.id}',-1)">−</button>

            </div>
          </div>`;
        });
        html+=`</div>`;

    </div></div></div>`;

}

function rpToggleSec(lid,sid){ const l=LISTS.find(x=>x.id===lid);const s=l?.sections.find(x=>x.id===sid);if(s){s.open=!s.open;renderRightPanel();} }
function rpToggleSubs(id){ const el=document.getElementById('rpsubs_'+id);if(el) el.style.display=el.style.display==='block'?'none':'block'; }
function rpToggleItem(lid,sid,iid){ const i=LISTS.find(x=>x.id===lid)?.sections.find(x=>x.id===sid)?.items.find(x=>x.id===iid);if(i){i.done=!i.done;renderRightPanel();} }
function rpToggleSub(lid,sid,iid,subid){ const sub=LISTS.find(x=>x.id===lid)?.sections.find(x=>x.id===sid)?.items.find(x=>x.id===iid)?.subitems.find(x=>x.id===subid);if(sub){sub.done=!sub.done;renderRightPanel();} }
function rpQty(lid,sid,iid,d){ const i=LISTS.find(x=>x.id===lid)?.sections.find(x=>x.id===sid)?.items.find(x=>x.id===iid);if(i){i.qty=Math.max(0,i.qty+d);renderRightPanel();} }
function rpSubQty(lid,sid,iid,subid,d){ const s=LISTS.find(x=>x.id===lid)?.sections.find(x=>x.id===sid)?.items.find(x=>x.id===iid)?.subitems.find(x=>x.id===subid);if(s){s.qty=Math.max(0,s.qty+d);renderRightPanel();} }
function rpAddItem(lid,sid){ const el=document.getElementById('rpadd_'+sid);const v=el?.value.trim();if(!v) return;const s=LISTS.find(x=>x.id===lid)?.sections.find(x=>x.id===sid);if(s){s.items.push({id:mkItemId(),name:v,qty:1,done:false,subitems:[]});el.value='';renderRightPanel();} }
function rpAddSection(lid){ const n=prompt('Section name:');if(!n?.trim()) return;const l=LISTS.find(x=>x.id===lid);if(l){l.sections.push({id:mkSecId(),name:n.trim(),open:true,items:[]});renderRightPanel();} }

function openAttachListModal(taskId){
  const task=tasks.find(t=>t.id===taskId);
  if(!task) return;
  const unattached=LISTS.filter(l=>!(task.lists||[]).includes(l.id));
  if(!unattached.length){alert('All lists already attached.');return;}
  const names=unattached.map((l,i)=>`${i+1}. ${l.name}`).join('\n');
  const choice=prompt('Choose a list to attach:\n'+names+'\n\nEnter number:');
  const idx=parseInt(choice)-1;
  if(isNaN(idx)||idx<0||idx>=unattached.length) return;
  if(!task.lists) task.lists=[];
  task.lists.push(unattached[idx].id);
  showSaveToast();
  renderAll();
}

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
let toastTimer=null;
function showSaveToast(){
  const t=document.getElementById('saveToast');
  if(!t) return;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ═══════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════ */
function renderAll(){
  renderRail();
  renderSidebar();
  renderMotionDrop();
  renderViewDrop();
  renderTimeDrop();
  if(activeView==='block')    renderBlock();
  if(activeView==='outlook')  renderOutlook();
  if(activeView==='overview') renderOverview();
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
setView('block');
renderAll();

</script>
